name: "sdse-controlnet"
tag: "${rmspace:${system.prompt_processor.prompt},_}-step1"
exp: 'sd1.5_normalbae-ours'
exp_root_dir: "outputs"
seed: 0
 
data_type: "random-camera-datamodule"
data:
  load_type: ${system.load_type}
  batch_size: 4
  eval_camera_distance: 4.0
  camera_distance_range: [1.5, 4.0]
  light_sample_strategy: "dreamfusion3dgs"
  height: 1024
  width: 1024
  eval_height: 1024
  eval_width: 1024

  # n_views: 80
  # max_view_num: 200
  # front_rate: 1.25
  # elevation_range: [-10 , 80]
system_type: "gaussiandreamer-system"
system:
  load_type: 0 # 0: load from shape, 1: load from smpl
  load_path: "./load/shapes/stand.obj" # only used when load_type == 1
  radius: ${data.eval_camera_distance}
  sh_degree: 0
  # position_lr_init: 5e-04 # 5e-06 # by default 5e-04
  # position_lr_final: 0.00025 # 5e-08 # by default 2.5e-04
  # feature_lr: 0.0005 # by default 0.0125
  # opacity_lr: 0.01
  # scaling_lr: 0.005
  # rotation_lr: 0.001

  # default values for densification from GaussianDreamer
  # densify_until_iter: 900
  # densify_from_iter: 300
  # densification_interval: 100
  # max_grad: 0.0002
  # max_densify_percent: 1 # 0.01
  # min_opacity: 0.05

  # use_cut_timestep_late: true
  # cut_timestep_at: 500
  guidance_eval_per: 500
  # fix_cond_img: false

  prompt_processor_type: "stable-diffusion-prompt-processor"
  prompt_processor:
    pretrained_model_name_or_path: "runwayml/stable-diffusion-v1-5"
    # prompt: "turn it into a fox"
    # negative_prompt: "ugly, bad anatomy, blurry, pixelated obscure, unnatural colors, poor lighting, dull, and unclear, cropped, lowres, low quality, artifacts, duplicate, morbid, mutilated, poorly drawn face, deformed, dehydrated, bad proportions, unfocused"
    negative_prompt: "oversaturated, smooth, pixelated, cartoon, foggy, hazy, blurry, bad structure, noisy, malformed"

  shape_prompt: ${system.prompt_processor.prompt}

  guidance_type: "stable-diffusion-controlnet-guidance"
  guidance:
    max_steps: ${trainer.max_steps}
    min_step_percent: 0.02
    max_step_percent: 0.98
    guidance_scale: 100
    condition_scale: 1.
    use_sdse: true
    use_sds: false
    # # use_only_y: false
    # use_non_incr_timesteps: false
    # mode_change_step: 800
    grad_clip: [0,1.5,2.0,1000]
    fixed_size: 512
    tgt_with_cond: True

  loggers:
    wandb:
      enable: false
      project: 'threestudio'
      name: ${name}_${tag}_${exp}

  loss:
    lambda_sds: 1.
    # lambda_sdse: 0.
    lambda_sparsity: 1.
    lambda_opaque: 0.0
    # lambda_anchor_color: 0 # 5 originally
    # lambda_anchor_geo: 0
    # lambda_anchor_opacity: 0
    # lambda_anchor_scale: 0

  optimizer:
    name: Adam
    args:
      lr: 0.001
      betas: [0.9, 0.99]
      eps: 1.e-15

trainer:
  max_steps: 1200
  log_every_n_steps: 1
  num_sanity_val_steps: 0
  val_check_interval: 500
  enable_progress_bar: true
  precision: 16-mixed

checkpoint:
  save_last: true # save at each validation time
  save_top_k: -1
  every_n_train_steps: ${trainer.max_steps}
